name: lms_player
description: Flutter LMS Player - Downloads, extracts, and plays encrypted media content.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0

  # Networking & file download
  http: ^1.2.1

  # File storage & paths
  path_provider: ^2.1.3
  archive: ^3.6.1

  # Encryption (AES)
  pointycastle: ^3.9.1
  convert: ^3.1.1
  crypto: ^3.0.3

  # State & utilities
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Progress / UI
  percent_indicator: ^4.2.3

  # Native video playback (alternative to WebView for encrypted media)
  video_player: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
